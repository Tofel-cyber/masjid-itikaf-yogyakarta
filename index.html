<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Direktori masjid untuk itikaf 3 hari di Yogyakarta dan sekitarnya">
<title>Masjid Itikaf Yogyakarta</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --amber-dark: #854F0B;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --gray-100: #F5F4F1;
    --gray-200: #E8E7E3;
    --gray-400: #A0A09A;
    --gray-600: #5F5E5A;
    --gray-900: #1C1C1A;
    --text: #1C1C1A;
    --text-muted: #6B6B65;
    --bg: #FAFAF8;
    --card-bg: #FFFFFF;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
 
  /* HEADER */
  .site-header {
    background: var(--green-dark);
    padding: 20px 16px 28px;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .site-header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-icon {
    font-size: 28px;
    margin-bottom: 6px;
    display: block;
  }
  .site-header h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 4px;
    position: relative;
  }
  .site-header p {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    position: relative;
  }
  .header-badge {
    position: absolute;
    top: 20px; right: 16px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
  }
 
  /* STATS */
  .stats-row {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--gray-200);
  }
  .stat-chip {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    background: var(--gray-100);
    border-radius: var(--radius-sm);
  }
  .stat-chip .num {
    font-size: 20px;
    font-weight: 600;
    color: var(--green);
    display: block;
    line-height: 1;
  }
  .stat-chip .lbl {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    display: block;
  }
 
  /* SEARCH & ADD */
  .toolbar {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--card-bg);
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    fill: var(--gray-400);
  }
  .search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-100);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--green); background: #fff; }
  .add-btn {
    background: var(--green);
    color: #fff;
    border: none;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.2s;
  }
  .add-btn:hover, .add-btn:active { background: var(--green-dark); }
 
  /* TABS */
  .tabs {
    display: flex;
    padding: 10px 16px 0;
    gap: 6px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--gray-200);
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--green-dark);
    border-bottom-color: var(--green);
  }
 
  /* CONTENT */
  .content { padding: 14px 16px; }
 
  /* MOSQUE CARDS */
  .mosque-card {
    background: var(--card-bg);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    box-shadow: var(--shadow);
  }
  .mosque-card:hover { border-color: var(--green-mid); box-shadow: var(--shadow-lg); }
  .mosque-card.selected { border-color: var(--green); border-width: 2px; }
  .mosque-card.is-new { border-left: 4px solid var(--amber); }
 
  .new-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--amber-light);
    color: var(--amber-dark);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
 
  .mosque-name {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    padding-right: 60px;
  }
  .mosque-area {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .rating-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .stars { color: var(--amber); font-size: 13px; }
  .rating-num { font-weight: 600; color: var(--text); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .status-text { color: var(--text-muted); }
 
  .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-green { background: var(--green-light); color: var(--green-dark); }
  .tag-blue { background: var(--blue-light); color: var(--blue); }
  .tag-gray { background: var(--gray-100); color: var(--gray-600); }
  .tag-amber { background: var(--amber-light); color: var(--amber-dark); }
 
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-wa.whatsapp { background: #25D366; color: #fff; }
  .btn-wa.whatsapp:hover { background: #1DA851; }
  .btn-wa.maps { background: var(--blue-light); color: var(--blue); border: 1.5px solid #B5D4F4; }
  .btn-wa.maps:hover { background: #B5D4F4; }
  .btn-wa.no-contact { background: var(--gray-100); color: var(--text-muted); font-size: 12px; cursor: default; }
 
  /* DETAIL PANEL */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .detail-overlay.open { display: flex; }
  .detail-sheet {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 32px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--gray-200);
    border-radius: 4px;
    margin: 12px auto 0;
  }
  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--gray-200);
  }
  .sheet-title {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .sheet-area { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .close-btn {
    background: var(--gray-100);
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
 
  .map-frame {
    width: 100%;
    height: 200px;
    border: none;
    margin-bottom: 0;
  }
  .sheet-body { padding: 16px 20px; }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .info-item label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-bottom: 3px;
  }
  .info-item span {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .divider { border: none; border-top: 1px solid var(--gray-200); margin: 14px 0; }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .facilities-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .notes-box {
    background: var(--gray-100);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .sheet-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .sheet-btn {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    text-decoration: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .sheet-btn.wa { background: #25D366; color: #fff; }
  .sheet-btn.wa:hover { background: #1DA851; }
  .sheet-btn.maps-btn { background: var(--blue-light); color: var(--blue); border: 1.5px solid #B5D4F4; }
 
  /* ADD FORM MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 0 32px;
    animation: slideUp 0.3s ease;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    background: var(--card-bg);
    z-index: 1;
  }
  .modal-title {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-weight: 600;
  }
  .modal-body { padding: 16px 20px; }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--green); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .save-btn:hover { background: var(--green-dark); }
  .cancel-btn {
    width: 100%;
    padding: 12px;
    background: none;
    color: var(--text-muted);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
  }
 
  /* MAP TAB */
  .map-full { width: 100%; height: calc(100vh - 220px); border: none; display: block; border-radius: var(--radius); overflow: hidden; }
 
  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state p { font-size: 14px; margin-top: 8px; }
 
  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-dark);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    z-index: 500;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
 
<header class="site-header">
  <span class="header-badge" id="header-badge">3 Masjid</span>
  <span class="header-icon">🕌</span>
  <h1>Masjid Itikaf<br>Yogyakarta</h1>
  <p>Direktori masjid untuk itikaf 3 hari</p>
</header>
 
<div class="stats-row">
  <div class="stat-chip">
    <span class="num" id="stat-total">3</span>
    <span class="lbl">Total Masjid</span>
  </div>
  <div class="stat-chip">
    <span class="num" id="stat-active">3</span>
    <span class="lbl">Aktif</span>
  </div>
  <div class="stat-chip">
    <span class="num">DIY</span>
    <span class="lbl">Wilayah</span>
  </div>
</div>
 
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="#A0A09A" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input class="search-input" type="text" id="search-input" placeholder="Cari masjid atau lokasi..." oninput="filterMosques()">
  </div>
  <button class="add-btn" onclick="openAddForm()">
    <span style="font-size:16px;">+</span> Tambah
  </button>
</div>
 
<div class="tabs">
  <button class="tab active" onclick="switchTab('list', this)">📋 Daftar</button>
  <button class="tab" onclick="switchTab('map', this)">🗺️ Peta</button>
</div>
 
<div class="content" id="tab-list">
  <div id="mosques-list"></div>
</div>
 
<div style="display:none; padding: 12px 16px;" id="tab-map">
  <iframe class="map-full"
    src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d31638.4!2d110.353!3d-7.797!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1smasjid%20itikaf%20yogyakarta!5e0!3m2!1sid!2sid!4v1"
    allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
  </iframe>
  <p style="font-size:12px; color:var(--text-muted); text-align:center; margin-top:8px;">Ketuk kartu masjid di tab Daftar untuk melihat lokasi detail.</p>
</div>
 
<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="d-name"></div>
        <div class="sheet-area" id="d-area"></div>
      </div>
      <button class="close-btn" onclick="closeDetailBtn()">✕</button>
    </div>
    <iframe class="map-frame" id="d-map" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <div class="sheet-body">
      <div class="info-grid">
        <div class="info-item"><label>Kapasitas Itikaf</label><span id="d-capacity"></span></div>
        <div class="info-item"><label>Kontak</label><span id="d-phone"></span></div>
        <div class="info-item" style="grid-column:1/-1"><label>Alamat</label><span id="d-address"></span></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Fasilitas</div>
      <div class="facilities-wrap" id="d-facilities"></div>
      <div class="section-label">Catatan</div>
      <div class="notes-box" id="d-notes"></div>
      <div class="sheet-actions" id="d-actions"></div>
    </div>
  </div>
</div>
 
<!-- ADD FORM MODAL -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">Tambah Masjid Baru</div>
      <button class="close-btn" onclick="closeAddForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nama Masjid *</label>
        <input type="text" id="f-name" placeholder="Mis. Masjid Al-Ikhlas">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nama Takmir *</label>
          <input type="text" id="f-takmir" placeholder="Nama PIC">
        </div>
        <div class="form-group">
          <label>Kapasitas (orang)</label>
          <input type="number" id="f-capacity" placeholder="Mis. 30">
        </div>
      </div>
      <div class="form-group">
        <label>No. WhatsApp Takmir *</label>
        <input type="tel" id="f-phone" placeholder="08xx atau +62xxx">
      </div>
      <div class="form-group">
        <label>Alamat Lengkap *</label>
        <input type="text" id="f-address" placeholder="Jl. ... No. ..., Kecamatan, Yogyakarta">
      </div>
      <div class="form-group">
        <label>Link Google Maps (opsional)</label>
        <input type="url" id="f-maps" placeholder="https://maps.google.com/...">
      </div>
      <div class="form-group">
        <label>Fasilitas (pisahkan dengan koma)</label>
        <input type="text" id="f-facilities" placeholder="Kamar mandi, Parkir, Kipas angin">
      </div>
      <div class="form-group">
        <label>Catatan / Prosedur Izin</label>
        <textarea id="f-notes" placeholder="Prosedur izin, waktu check-in, hal khusus lainnya..."></textarea>
      </div>
      <button class="save-btn" onclick="addMosque()">💾 Simpan Masjid</button>
      <button class="cancel-btn" onclick="closeAddForm()">Batal</button>
    </div>
  </div>
</div>
 
<!-- TOAST -->
<div class="toast" id="toast"></div>
 
<script>
// ═══════════════════════════════════════
// DATA MASJID
// ═══════════════════════════════════════
let mosques = [
  {
    id: 1,
    name: "Masjid AR Rahmat",
    area: "Ngampilan, Kota Yogyakarta",
    address: "Jl. Letjen Suprapto No.51, Ngampilan, Kota Yogyakarta, DIY 55261",
    takmir: "Pengurus Takmir AR Rahmat",
    phone: null,
    capacity: "40",
    facilities: ["Tempat wudhu", "Kamar mandi", "Kipas angin", "Karpet bersih"],
    notes: "Lingkungan ramah dan nyaman. Tersedia kegiatan belajar Al-Qur'an. Rating Google 4.6/5.",
    rating: 4.6,
    mapsUrl: "https://maps.google.com/?q=Masjid+Ar-Rahmat+Ngampilan+Yogyakarta",

    takmir: "Pengurus Takmir Nurul Falah",

    notes: "Masjid buka 24 jam. Tersedia CCTV untuk keamanan jamaah. Kamar mandi di belakang masjid. Rating Google 4.9/5 — sangat direkomendasikan.",
    rating: 4.9,
    mapsUrl: "https://maps.google.com/?q=Masjid+Nurul+Falah+Tompeyan+Yogyakarta",
    embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3952.5!2d110.3537!3d-7.7857!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e7a5969b2e8a203%3A0xbfbe07d29caabe75!2sMasjid%20Nurul%20Falah%20Tompeyan!5e0!3m2!1sid!2sid!4v1",
    isNew: false,
    tags: ["Tompeyan", "Tegalrejo", "24 Jam"]
  },
  {
    id: 3,
    name: "Masjid Condro",
    area: "Mantrijeron, dekat Pasar Condro, Yogyakarta",
    address: "Jl. Bantul, Gedongkiwo, Kec. Mantrijeron, Kota Yogyakarta, DIY 55142",
    takmir: "Pengurus Takmir Masjid Condro",
    phone: null,
    capacity: "30",
    facilities: ["Tempat wudhu", "Kamar mandi", "Karpet bersih"],
    notes: "Berlokasi dekat Pasar Condronegaran di kawasan Mantrijeron. Masjid bersejarah yang nyaman untuk itikaf. Rating Google 4.7/5.",
    rating: 4.7,
    mapsUrl: "https://maps.google.com/?q=Masjid+Condro+Gedongkiwo+Mantrijeron+Yogyakarta",
    embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3953.8!2d110.3558!3d-7.8139!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e7a4f9b19d944bf%3A0xe127fe93b9e67f8e!2sCipto%20Wiworo%20Mosque!5e0!3m2!1sid!2sid!4v1",

<script type="module">
// ═══════════════════════════════════════
// FIREBASE IMPORT
// ═══════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ═══════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyB2bGKhvCgY-5bRhUjNiJ6kz6DGfhLHpjY",
  authDomain: "masjid-itikaf-jogja.firebaseapp.com",
  projectId: "masjid-itikaf-jogja",
  storageBucket: "masjid-itikaf-jogja.firebasestorage.app",
  messagingSenderId: "641773773335",
  appId: "1:641773773335:web:803dea6a59510df4fb7252",
  measurementId: "G-C19B5B6190"
};

// ═══════════════════════════════════════
// INIT FIREBASE
// ═══════════════════════════════════════
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// ═══════════════════════════════════════
// GLOBAL DATA
// ═══════════════════════════════════════
let mosques = [];


// ═══════════════════════════════════════
// REALTIME LOAD DATA
// ═══════════════════════════════════════
const q = query(
  collection(db, "mosques")
);

onSnapshot(q, (snapshot) => {

  mosques = [];

  snapshot.forEach((doc) => {

    mosques.push({
      id: doc.id,
      ...doc.data()
    });

  });

  renderList();

});


// ═══════════════════════════════════════
// UPDATE STATS
// ═══════════════════════════════════════
function updateStats() {

  const total = mosques.length;

  document.getElementById('stat-total').textContent = total;

  document.getElementById('stat-active').textContent = total;

  document.getElementById('header-badge').textContent =
    total + ' Masjid';
}


// ═══════════════════════════════════════
// RENDER LIST
// ═══════════════════════════════════════
function renderList() {

  const searchInput =
    document.getElementById('search-input');

  const keyword =
    searchInput
      ? searchInput.value.toLowerCase().trim()
      : '';

  const filtered = mosques.filter(m => {

    return (
      (m.name || '').toLowerCase().includes(keyword) ||
      (m.area || '').toLowerCase().includes(keyword) ||
      (m.address || '').toLowerCase().includes(keyword)
    );

  });

  const container =
    document.getElementById('mosques-list');

  if (!container) return;

  if (filtered.length === 0) {

    container.innerHTML = `
      <div class="empty-state">
        <div style="font-size:40px;">🕌</div>
        <p>Belum ada data masjid</p>
      </div>
    `;

    updateStats();

    return;
  }

  container.innerHTML = filtered.map(m => `

    <div class="mosque-card ${m.isNew ? 'is-new' : ''}"
      onclick="openDetail('${m.id}')">

      ${m.isNew
        ? '<span class="new-badge">✦ Baru</span>'
        : ''
      }

      <div class="mosque-name">
        ${m.name || '-'}
      </div>

      <div class="mosque-area">
        📍 ${m.area || '-'}
      </div>

      <div class="rating-row">

        <span class="stars">
          ${'★'.repeat(Math.round(m.rating || 0))}
        </span>

        <span class="rating-num">
          ${m.rating || '-'}
        </span>

      </div>

      <div class="tags-row">

        ${(m.tags || []).map(t => `
          <span class="tag tag-green">
            ${t}
          </span>
        `).join('')}

      </div>

      <div class="card-actions">

        ${m.phone
          ? `
            <a
              href="https://wa.me/${String(m.phone).replace(/[^0-9]/g,'')}"
              class="btn-wa whatsapp"
              target="_blank"
              onclick="event.stopPropagation()"
            >
              WhatsApp
            </a>
          `
          : `
            <span class="btn-wa no-contact">
              Tidak ada kontak
            </span>
          `
        }

        <a
          href="${m.mapsUrl || '#'}"
          target="_blank"
          class="btn-wa maps"
          onclick="event.stopPropagation()"
        >
          🗺️ Maps
        </a>

      </div>

    </div>

  `).join('');

  updateStats();
}


// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
window.filterMosques = function() {
  renderList();
};


// ═══════════════════════════════════════
// ADD MOSQUE
// ═══════════════════════════════════════
window.addMosque = async function() {

  const name =
    document.getElementById('f-name').value.trim();

  const takmir =
    document.getElementById('f-takmir').value.trim();

  const phone =
    document.getElementById('f-phone').value.trim();

  const address =
    document.getElementById('f-address').value.trim();

  const capacity =
    document.getElementById('f-capacity').value.trim();

  const maps =
    document.getElementById('f-maps').value.trim();

  const facilities =
    document.getElementById('f-facilities').value.trim();

  const notes =
    document.getElementById('f-notes').value.trim();

  if (!name || !address) {

    showToast('⚠️ Nama dan alamat wajib diisi');

    return;
  }

  try {

    await addDoc(collection(db, "mosques"), {

      name,
      takmir,
      phone,
      address,
      area: address,
      capacity,

      facilities: facilities
        ? facilities.split(',').map(f => f.trim())
        : [],

      notes,

      rating: 0,

      mapsUrl:
        maps ||
        `https://maps.google.com/?q=${encodeURIComponent(name + ' ' + address)}`,

      embedUrl: maps || '',

      isNew: true,

      tags: ['Baru'],

      createdAt: Date.now()

    });

    clearForm();

    closeAddForm();

    showToast('✅ Masjid berhasil ditambahkan');

  } catch (error) {

    console.error(error);

    showToast('❌ Gagal menyimpan');

  }

};


// ═══════════════════════════════════════
// CLEAR FORM
// ═══════════════════════════════════════
function clearForm() {

  [
    'f-name',
    'f-takmir',
    'f-phone',
    'f-address',
    'f-capacity',
    'f-maps',
    'f-facilities',
    'f-notes'
  ].forEach(id => {

    const el = document.getElementById(id);

    if (el) el.value = '';

  });

}


// ═══════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════
window.openDetail = function(id) {

  const m =
    mosques.find(x => x.id === id);

  if (!m) return;

  document.getElementById('d-name').textContent =
    m.name || '-';

  document.getElementById('d-area').textContent =
    m.area || '-';

  document.getElementById('d-address').textContent =
    m.address || '-';

  document.getElementById('d-phone').textContent =
    m.phone || '-';

  document.getElementById('d-capacity').textContent =
    m.capacity || '-';

  document.getElementById('d-notes').textContent =
    m.notes || '-';

  document.getElementById('d-facilities').innerHTML =
    (m.facilities || []).map(f => `
      <span class="tag tag-green">
        ${f}
      </span>
    `).join('');

  document.getElementById('d-map').src =
    m.embedUrl || '';

  document.getElementById('d-actions').innerHTML = `

    <a
      href="${m.mapsUrl || '#'}"
      target="_blank"
      class="sheet-btn maps-btn"
    >
      🗺️ Buka Maps
    </a>

  `;

  document.getElementById('detail-overlay')
    .classList.add('open');

  document.body.style.overflow = 'hidden';

};


// ═══════════════════════════════════════
// CLOSE DETAIL
// ═══════════════════════════════════════
window.closeDetailBtn = function() {

  document.getElementById('detail-overlay')
    .classList.remove('open');

  document.body.style.overflow = '';

};

window.closeDetail = function(e) {

  if (e.target.id === 'detail-overlay') {
    closeDetailBtn();
  }

};


// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
window.openAddForm = function() {

  document.getElementById('add-modal')
    .classList.add('open');

  document.body.style.overflow = 'hidden';

};

window.closeAddForm = function() {

  document.getElementById('add-modal')
    .classList.remove('open');

  document.body.style.overflow = '';

};

window.closeAddModal = function(e) {

  if (e.target.id === 'add-modal') {
    closeAddForm();
  }

};


// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg) {

  const toast =
    document.getElementById('toast');

  toast.textContent = msg;

  toast.classList.add('show');

  setTimeout(() => {

    toast.classList.remove('show');

  }, 3000);

}


// ═══════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════
window.switchTab = function(tab, el) {

  document.querySelectorAll('.tab')
    .forEach(t => t.classList.remove('active'));

  el.classList.add('active');

  document.getElementById('tab-list').style.display =
    tab === 'list' ? 'block' : 'none';

  document.getElementById('tab-map').style.display =
    tab === 'map' ? 'block' : 'none';

};
</script>
</body>
</html>
